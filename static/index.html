<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lenticularis — Map</title>
  <!-- Leaflet.js -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Shared nav ─────────────────────────────────────────────── */
    .top-nav {
      background: #1a1f2e;
      border-bottom: 1px solid #2d3748;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      height: 48px;
    }

    .nav-brand {
      font-size: 1.1rem;
      font-weight: 600;
      color: #90cdf4;
      margin-right: 24px;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      gap: 2px;
      flex: 1;
    }

    .nav-link {
      color: #718096;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 6px 14px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .nav-link:hover { background: #2d3748; color: #e2e8f0; }
    .nav-link.active { background: #2d4a6e; color: #90cdf4; font-weight: 500; }

    .nav-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #718096;
    }

    .nav-user { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .nav-user-name { font-size: 0.85rem; color: #90cdf4; }
    .nav-btn { background: transparent; border: 1px solid #4a5568; color: #a0aec0; font-size: 0.8rem; padding: 4px 10px; border-radius: 5px; cursor: pointer; transition: background 0.15s; }
    .nav-btn:hover { background: #2d3748; color: #e2e8f0; }

    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.green { background: #48bb78; }
    .dot.grey  { background: #4a5568; }

    /* ── Map ────────────────────────────────────────────────────── */
    #map {
      flex: 1;
      width: 100%;
    }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper {
      background: #1a1f2e;
      color: #e2e8f0;
      border: 1px solid #2d3748;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip {
      background: #1a1f2e;
    }
    .leaflet-popup-content {
      margin: 12px 16px;
      font-size: 0.82rem;
      line-height: 1.6;
    }
    .popup-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #90cdf4;
      margin-bottom: 6px;
    }
    .popup-meta {
      color: #718096;
      font-size: 0.75rem;
      margin-bottom: 8px;
    }
    .popup-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: #a0aec0;
    }
    .popup-row span:last-child { color: #e2e8f0; font-weight: 500; }
    .popup-missing { color: #4a5568; }
    .popup-link {
      display: inline-block;
      margin-top: 10px;
      background: #2b6cb0;
      color: #fff !important;
      text-decoration: none;
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 0.8rem;
      transition: background 0.15s;
    }
    .popup-link:hover { background: #3182ce; color: #fff !important; }

    .network-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      vertical-align: middle;
    }
    .network-meteoswiss { background: #2a4365; color: #90cdf4; }
    .network-metar      { background: #2f855a; color: #c6f6d5; }
    .network-holfuy     { background: #22543d; color: #9ae6b4; }
    .network-slf        { background: #44337a; color: #d6bcfa; }
    .network-windline   { background: #1f4e5f; color: #b2f5ea; }
    .network-ecovitt    { background: #7b341e; color: #fbd38d; }
    .network-unknown    { background: #2d3748; color: #a0aec0; }
  </style>
</head>
<body>

<nav class="top-nav">
  <span class="nav-brand">🪁 Lenticularis</span>
  <div class="nav-links">
    <a href="/" class="nav-link active">Map</a>
    <a href="/stations" class="nav-link">Stations</a>
    <a href="/rulesets" class="nav-link">Rule Sets</a>
  </div>
  <div class="nav-status">
    <span class="dot grey" id="dbDot"></span>
    <span id="navStatus">Connecting…</span>
  </div>
  <div class="nav-user" id="navUser"></div>
</nav>

<div id="map"></div>

<script src="/static/map.js"></script>
<script type="module">
  import { renderNavAuth } from '/static/auth.js';
  renderNavAuth('map');
</script>
</body>
</html>

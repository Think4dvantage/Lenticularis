<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lenticularis — Map</title>
  <!-- Leaflet.js -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="/static/shared.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Shared nav ─────────────────────────────────────────────── */
    .top-nav {
      background: #1a1f2e;
      border-bottom: 1px solid #2d3748;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      height: 48px;
    }

    .nav-brand {
      font-size: 1.1rem;
      font-weight: 600;
      color: #90cdf4;
      margin-right: 24px;
      white-space: nowrap;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2px;
      flex: 1;
    }

    .nav-link {
      color: #718096;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 6px 14px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .nav-link:hover { background: #2d3748; color: #e2e8f0; }
    .nav-link.active { background: #2d4a6e; color: #90cdf4; font-weight: 500; }

    .nav-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #718096;
    }

    .nav-user { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .nav-user-name { font-size: 0.85rem; color: #90cdf4; }
    .nav-btn { background: transparent; border: 1px solid #4a5568; color: #a0aec0; font-size: 0.8rem; padding: 4px 10px; border-radius: 5px; cursor: pointer; transition: background 0.15s; }
    .nav-btn:hover { background: #2d3748; color: #e2e8f0; }
    #navLangPicker { display: flex; gap: 2px; margin-left: 8px; }
    .lang-btn { background: transparent; border: 1px solid #4a5568; color: #718096; font-size: 0.72rem; padding: 3px 7px; border-radius: 4px; cursor: pointer; transition: background 0.15s; }
    .lang-btn:hover { background: #2d3748; color: #e2e8f0; }
    .lang-btn.active { background: #2d4a6e; color: #90cdf4; border-color: #4a7bab; }

    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.green { background: #48bb78; }
    .dot.grey  { background: #4a5568; }

    /* ── Map ────────────────────────────────────────────────────── */
    #map {
      flex: 1;
      width: 100%;
    }

    /* ── Time navigation bar ────────────────────────────────────── */
    #timeNavBar {
      background: #111827;
      border-top: 1px solid #2d3748;
      flex-shrink: 0;
    }

    .tn-day-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 16px;
      overflow-x: auto;
    }

    .tn-hour-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 4px 16px;
      border-bottom: 1px solid #1a2035;
      background: #0d1117;
      overflow-x: auto;
    }

    .freshness.forecast { color: #f6ad55; }

    .tn-day-btn {
      background: #1a2035;
      border: 1px solid #4a5568;
      border-radius: 6px;
      color: #a0aec0;
      font-size: 0.76rem;
      padding: 5px 10px;
      cursor: pointer;
      white-space: nowrap;
      text-align: center;
      min-width: 66px;
      line-height: 1.3;
      transition: background 0.12s, color 0.12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .tn-day-btn small { font-size: 0.65rem; color: #718096; }
    .tn-day-btn:hover { background: #2d3748; color: #e2e8f0; }
    .tn-day-btn.active { background: #2b6cb0; border-color: #3182ce; color: #fff; }
    .tn-day-btn.active small { color: #bee3f8; }
    .tn-day-btn.now-btn { border-color: #276749; color: #68d391; }
    .tn-day-btn.now-btn:hover { background: #1c3a2c; }
    .tn-day-btn.now-btn.active { background: #276749; border-color: #68d391; color: #fff; }
    .tn-day-btn.now-btn.active small { color: #c6f6d5; }
    .tn-day-btn.future { border-color: #744210; color: #f6ad55; }
    .tn-day-btn.future:hover { background: #2d1f0a; }
    .tn-day-btn.future.active { background: #744210; border-color: #f6ad55; color: #fefcbf; }
    .tn-day-btn.future.active small { color: #fef08a; }

    .tn-sep { width: 1px; height: 28px; background: #2d3748; flex-shrink: 0; margin: 0 4px; }

    .tn-custom-input {
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 5px;
      color: #e2e8f0;
      padding: 4px 8px;
      font-size: 0.76rem;
    }

    .tn-hour-btn {
      background: #1a2035;
      border: 1px solid #4a5568;
      border-radius: 5px;
      color: #a0aec0;
      font-size: 0.74rem;
      padding: 3px 7px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, color 0.12s;
    }
    .tn-hour-btn:hover { background: #2d3748; color: #e2e8f0; }
    .tn-hour-btn.active { background: #2b6cb0; border-color: #3182ce; color: #fff; }

    .tn-time-display {
      color: #90cdf4;
      font-variant-numeric: tabular-nums;
      font-size: 0.76rem;
      white-space: nowrap;
      margin: 0 8px;
    }

    .tn-play-btn {
      background: #276749;
      border: 1px solid #48bb78;
      border-radius: 5px;
      color: #68d391;
      font-size: 0.76rem;
      padding: 3px 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.12s;
    }
    .tn-play-btn:hover { background: #2f855a; }
    .tn-play-btn.playing { background: #7b341e; border-color: #f6ad55; color: #fed7aa; }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper {
      background: #1a1f2e;
      color: #e2e8f0;
      border: 1px solid #2d3748;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip {
      background: #1a1f2e;
    }
    .leaflet-popup-content {
      margin: 12px 16px;
      font-size: 0.82rem;
      line-height: 1.6;
    }
    .popup-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #90cdf4;
      margin-bottom: 6px;
    }
    .popup-meta {
      color: #718096;
      font-size: 0.75rem;
      margin-bottom: 8px;
    }
    .popup-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: #a0aec0;
    }
    .popup-row span:last-child { color: #e2e8f0; font-weight: 500; }
    .popup-missing { color: #4a5568; }
    .popup-link {
      display: inline-block;
      margin-top: 10px;
      background: #2b6cb0;
      color: #fff !important;
      text-decoration: none;
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 0.8rem;
      transition: background 0.15s;
    }
    .popup-link:hover { background: #3182ce; color: #fff !important; }

    .network-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      vertical-align: middle;

    .network-meteoswiss  { background: #2a4365; color: #90cdf4; }
    .network-metar       { background: #2f855a; color: #c6f6d5; }
    .network-holfuy      { background: #22543d; color: #9ae6b4; }
    .network-slf         { background: #44337a; color: #d6bcfa; }
    .network-windline    { background: #1f4e5f; color: #b2f5ea; }
    .network-ecovitt     { background: #7b341e; color: #fbd38d; }
    .network-wunderground{ background: #5c3a00; color: #f6ad55; }
    .network-foehn       { background: #44271a; color: #f6ad55; }
    .network-unknown     { background: #2d3748; color: #a0aec0; }

    /* Condition breakdown in ruleset popups */
    .popup-cond-header {
      color: #718096; font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.07em; margin: 10px 0 4px; border-top: 1px solid #2d3748; padding-top: 8px;
    }
    .popup-cond-row {
      display: flex; align-items: flex-start; gap: 5px;

    }
    .popup-cond-text {
      display: flex; flex-direction: column; gap: 1px; line-height: 1.3;

    .popup-cond-group {
      border-left: 2px solid #4a5568; padding-left: 6px; margin: 4px 0;

    .popup-cond-group-label {
      font-size: 0.65rem; color: #718096; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 2px;
    }

      <button class="tn-hour-btn" data-hour="13" onclick="tnSelectHour(13)">13:00</button>

      <button class="tn-hour-btn" data-hour="16" onclick="tnSelectHour(16)">16:00</button>

    <button class="tn-day-btn" data-offset="-2" onclick="tnSelectDay(-2)"><span data-i18n="map.time_nav.minus2">−2 Days</span><small id="tnLabel_m2"></small></button>
    <button class="tn-day-btn" data-offset="-1" onclick="tnSelectDay(-1)"><span data-i18n="map.time_nav.yesterday">Yesterday</span><small id="tnLabel_m1"></small></button>
    <button class="tn-day-btn" data-offset="0" onclick="tnSelectDay(0)"><span data-i18n="map.time_nav.today">Today</span><small id="tnLabel_0"></small></button>

    <button class="tn-day-btn future" data-offset="1" onclick="tnSelectDay(1)"><span data-i18n="map.time_nav.tomorrow">Tomorrow</span><small id="tnLabel_1"></small></button>
    <button class="tn-day-btn future" data-offset="2" onclick="tnSelectDay(2)"><span data-i18n="map.time_nav.plus2">+2 Days</span><small id="tnLabel_2"></small></button>
    <button class="tn-day-btn future" data-offset="3" onclick="tnSelectDay(3)"><span data-i18n="map.time_nav.plus3">+3 Days</span><small id="tnLabel_3"></small></button>
    <button class="tn-day-btn future" data-offset="4" onclick="tnSelectDay(4)"><span data-i18n="map.time_nav.plus4">+4 Days</span><small id="tnLabel_4"></small></button>
    <button class="tn-day-btn future" data-offset="5" onclick="tnSelectDay(5)"><span data-i18n="map.time_nav.plus5">+5 Days</span><small id="tnLabel_5"></small></button>

<script src="/static/replay.js"></script>
<script src="/static/map.js"></script>
<script>
// ---------------------------------------------------------------------------
// Time navigation bar
// ---------------------------------------------------------------------------
let _tnOffset     = null;    // integer day offset (0=today), null = live or custom
let _tnLive       = true;    // true when in live mode (Now button active)
let _tnCustomDate = null;    // "YYYY-MM-DD" when custom date selected
let _tnPlayTimer  = null;
let _tnPlayActive = false;
let _tnPlayHour   = 7;

const _mapReplay = new ReplayEngine(
  // onFrame — update time display and nearest hour button
  (snapshot, ts, idx, total, isForecast) => {
    applyReplaySnapshot(snapshot);
    const d = new Date(ts);
    const el = document.getElementById('tnTimeDisplay');
    if (el) {
      el.textContent = (isForecast ? '📡 ' : '') +
        d.toLocaleString([], { month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12: false, timeZoneName:'short' });
      el.style.color = isForecast ? '#f6ad55' : '';
    }
    // Highlight the nearest hour button (only when not in our own play animation)
    if (!_tnPlayActive) {
      const h = d.getHours(); // local hour
      document.querySelectorAll('.tn-hour-btn').forEach(b => {
        const bh = +b.dataset.hour;
        b.classList.toggle('active', bh === h || (d.getMinutes() >= 30 && bh === h + 1));
      });
    }
  },
  // onStateChange — show loading state on play button
  (state) => {
    const playBtn = document.getElementById('tnPlayDayBtn');
    if (playBtn && state === 'loading') {
      playBtn.textContent = window.t('map.time_nav.loading');
      playBtn.classList.remove('playing');
    } else if (playBtn && state !== 'loading' && !_tnPlayActive) {
      playBtn.textContent = window.t('map.time_nav.play_day');
    }
  }
);

// -- Day label initialisation ------------------------------------------------
function tnInitLabels() {
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();
  // Use local midnight so the day labels match the user's calendar
  const localMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  for (let off = -3; off <= 5; off++) {
    const d = new Date(localMidnight + off * 86400000);
    const label = `${DOW[d.getDay()]} ${d.getDate()} ${MON[d.getMonth()]}`;
    const key = off < 0 ? `m${-off}` : `${off}`;
    const el = document.getElementById(`tnLabel_${key}`);
    if (el) el.textContent = label;
  }
}

// -- Live mode (Now button) --------------------------------------------------
function tnGoLive() {
  _tnLive = true;
  _tnOffset = null;
  _tnCustomDate = null;
  tnStopPlay();
  document.querySelectorAll('.tn-day-btn[data-offset]').forEach(b => b.classList.remove('active'));
  document.getElementById('tnCustomBtn').classList.remove('active');
  document.getElementById('tnCustomDate').style.display = 'none';
  document.getElementById('tnNowBtn').classList.add('active');
  document.getElementById('tnHourRow').style.display = 'none';
  _mapReplay.pause();
  loadStations();
  startLiveRefresh();
}

// Returns the forecast_hours needed to cover a given day offset from today.
function tnForecastHours(offset) {
  if (offset === null || offset < 0) return 0;
  if (offset === 0) return 36;
  return Math.min(120, (offset + 1) * 24 + 12);
}

// -- Day selection -----------------------------------------------------------
async function tnSelectDay(offset) {
  _tnOffset = offset;
  _tnLive = false;
  _tnCustomDate = null;
  tnStopPlay();

  document.querySelectorAll('.tn-day-btn[data-offset]').forEach(b =>
    b.classList.toggle('active', +b.dataset.offset === offset));
  document.getElementById('tnNowBtn').classList.remove('active');
  document.getElementById('tnCustomBtn').classList.remove('active');
  document.getElementById('tnCustomDate').style.display = 'none';

  stopLiveRefresh();
  _mapReplay.pause();
  document.getElementById('tnHourRow').style.display = 'block';

  const [start, end] = tnDayBounds(offset, null);
  const fh = tnForecastHours(offset);
  const loadParams = fh > 0
    ? { start, end, forecast_hours: fh }
    : { start, end, include_forecast: false };
  console.log(`[Lenti:index] day button clicked offset=${offset} fh=${fh}`, loadParams);
  try { await _mapReplay.load(loadParams); } catch(err) { console.error('[Lenti:index] Time nav load error:', err); }

  tnSeekToHour(12);
}

function tnToggleCustom() {
  const inp = document.getElementById('tnCustomDate');
  const btn = document.getElementById('tnCustomBtn');
  if (inp.style.display === 'none') {
    const now = new Date();
    inp.min = new Date(now.getTime() - 30 * 86400000).toISOString().slice(0, 10);
    inp.max = new Date(now.getTime() +  5 * 86400000).toISOString().slice(0, 10);
    inp.style.display = 'inline-block';
    inp.focus();
    btn.classList.add('active');
  } else {
    inp.style.display = 'none';
    btn.classList.remove('active');
  }
}

async function tnSelectCustomDate() {
  const val = document.getElementById('tnCustomDate').value;
  if (!val) return;
  _tnCustomDate = val;
  _tnOffset = null;
  tnStopPlay();

  _tnLive = false;
  document.querySelectorAll('.tn-day-btn[data-offset]').forEach(b => b.classList.remove('active'));
  document.getElementById('tnNowBtn').classList.remove('active');
  document.getElementById('tnCustomBtn').classList.add('active');

  stopLiveRefresh();
  document.getElementById('tnHourRow').style.display = 'block';
  const [start, end] = tnDayBounds(null, val);
  const customDayStart = new Date(val + 'T00:00:00Z');
  const daysAhead = Math.ceil((customDayStart - new Date()) / 86400000);
  const fh = tnForecastHours(daysAhead);
  const loadParams = fh > 0
    ? { start, end, forecast_hours: fh }
    : { start, end, include_forecast: false };
  try { await _mapReplay.load(loadParams); } catch(err) { console.error('Time nav load error:', err); }
  tnSeekToHour(12);
}

function tnDayBounds(offset, dateStr) {
  let d;
  if (dateStr) {
    d = new Date(dateStr + 'T00:00:00Z');
  } else {
    const now = new Date();
    d = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()) + offset * 86400000);
  }
  return [d.toISOString(), new Date(d.getTime() + 86400000 - 1000).toISOString()];
}

// -- Hour navigation ---------------------------------------------------------
function tnSeekToHour(hour) {
  const ts = _mapReplay._timestamps;
  if (!ts || ts.length === 0) return;
  // hour is a local-time hour; convert to UTC for the seek target
  const offsetHours = Math.round(-new Date().getTimezoneOffset() / 60);
  const utcHour = (hour - offsetHours + 24) % 24;
  let dayMs;
  if (_tnCustomDate) {
    dayMs = new Date(_tnCustomDate + 'T00:00:00Z').getTime();
  } else if (_tnOffset != null) {
    // Note: _tnOffset can be 0 (today) which is falsy — must use != null
    const now = new Date();
    dayMs = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()) + _tnOffset * 86400000;
  } else {
    dayMs = new Date(new Date(ts[0]).setUTCHours(0, 0, 0, 0)).getTime();
  }
  const target = dayMs + utcHour * 3600000;
  let bestIdx = 0, bestDiff = Infinity;
  for (let i = 0; i < ts.length; i++) {
    const diff = Math.abs(new Date(ts[i]).getTime() - target);
    if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
    if (new Date(ts[i]).getTime() > target + 3600000) break;
  }
  console.log(
    `[Lenti:index] seekToHour(${hour}): target=${new Date(target).toISOString()}` +
    ` → frame ${bestIdx}/${ts.length - 1} ts=${ts[bestIdx]}` +
    ` diff=${(bestDiff / 3600000).toFixed(1)}h`
  );
  _mapReplay.seekTo(bestIdx);
}

function tnSelectHour(hour) {
  _tnPlayHour = hour;
  document.querySelectorAll('.tn-hour-btn').forEach(b =>
    b.classList.toggle('active', +b.dataset.hour === hour));
  tnSeekToHour(hour);
}

// -- Day play animation ------------------------------------------------------
function tnTogglePlay() {
  if (_tnPlayActive) tnStopPlay(); else tnStartPlay();
}

function tnStartPlay() {
  _tnPlayActive = true;
  const btn = document.getElementById('tnPlayDayBtn');
  btn.textContent = window.t('map.time_nav.stop');
  btn.classList.add('playing');
  let h = (_tnPlayHour >= 7 && _tnPlayHour < 19) ? _tnPlayHour : 7;
  function step() {
    if (!_tnPlayActive || h > 19) { tnStopPlay(); return; }
    tnSelectHour(h++);
    _tnPlayTimer = setTimeout(step, 600);
  }
  step();
}

function tnStopPlay() {
  _tnPlayActive = false;
  if (_tnPlayTimer) { clearTimeout(_tnPlayTimer); _tnPlayTimer = null; }
  const btn = document.getElementById('tnPlayDayBtn');
  if (btn) { btn.textContent = window.t('map.time_nav.play_day'); btn.classList.remove('playing'); }
}

// Initialise day labels
tnInitLabels();

// Pre-warm the replay cache for the most-used forecast days.
// Starts immediately after station markers are drawn, in priority order
// (tomorrow first — most commonly clicked), all running concurrently.
const _prefetchAbort = new AbortController();
window.addEventListener('pagehide', () => { console.log('[Lenti:index] pagehide — aborting prefetch requests'); _prefetchAbort.abort(); });

window._stationsReady.then(async () => {
  // Prefetch all day buttons sequentially, expanding outward from "now":
  // tomorrow first (most clicked), then today, +2, yesterday, +3, -2, +4, -3, +5
  console.log('[Lenti:index] stations ready — starting sequential background prefetch for all day buttons');
  for (const offset of [1, 0, 2, -1, 3, -2, 4, -3, 5]) {
    if (_prefetchAbort.signal.aborted) break;
    const [start, end] = tnDayBounds(offset, null);
    const fh = tnForecastHours(offset);
    const params = fh > 0
      ? { start, end, forecast_hours: fh }
      : { start, end, include_forecast: false };
    console.log(`[Lenti:index] prefetching offset=${offset} fh=${fh}`, params);
    await _mapReplay.prefetch(params, _prefetchAbort.signal);
  }
  console.log('[Lenti:index] background prefetch complete');
});
</script>
<script type="module">
  import { initI18n, renderLangPicker } from '/static/i18n.js';
  import { renderNavAuth, isLoggedIn, fetchAuth } from '/static/auth.js';
  await initI18n();
  document.dispatchEvent(new CustomEvent('i18nReady'));
  renderNavAuth('map');
  renderLangPicker();

  if (isLoggedIn()) {

  // ── Decision colour palette ─────────────────────────────────────────────
  const DC = { green: '#68d391', orange: '#f6ad55', red: '#fc8181', null: '#4a5568' };

  function decisionColor(d) { return DC[d] ?? DC.null; }

  // ── Marker icons ────────────────────────────────────────────────────────
  function launchIcon(launchColor, haloColor) {
    const lc = decisionColor(launchColor);
    const halo = haloColor
      ? `<circle cx="24" cy="24" r="21" fill="none" stroke="${decisionColor(haloColor)}" stroke-width="5" opacity="0.8"/>`
      : '';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
      ${halo}
      <circle cx="24" cy="24" r="13" fill="${lc}" fill-opacity="0.92"/>
      <text x="24" y="29" font-size="13" text-anchor="middle" fill="#000" opacity="0.7">▲</text>
    </svg>`;
    return L.divIcon({ html: svg, className: '', iconSize: [48, 48], iconAnchor: [24, 24], popupAnchor: [0, -26] });
  }

  function landingIcon(color) {
    const c = decisionColor(color);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="32" viewBox="0 0 24 32">
      <line x1="4" y1="2" x2="4" y2="30" stroke="${c}" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="4,3 22,10 4,17" fill="${c}" fill-opacity="0.85"/>
    </svg>`;
    return L.divIcon({ html: svg, className: '', iconSize: [24, 32], iconAnchor: [4, 30], popupAnchor: [10, -30] });
  }

  function opportunityIcon() {
    // Always green — only rendered when decision is green
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="#68d391" fill-opacity="0.15"/>
      <polygon points="20,4 36,20 20,36 4,20" fill="#68d391" fill-opacity="0.85"/>
      <text x="20" y="25" font-size="11" text-anchor="middle" fill="#000" opacity="0.6">✦</text>
    </svg>`;
    return L.divIcon({ html: svg, className: '', iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -22] });
  }

  // ── Popup HTML ──────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  const FIELD_LABEL = {
    wind_speed:    window.t('map.popup.wind'),
    wind_gust:     window.t('map.popup.gust'),
    wind_direction:window.t('map.popup.direction'),
    temperature:   window.t('map.popup.temperature'),
    humidity:      window.t('map.popup.humidity'),
    pressure:      window.t('map.popup.pressure'),
    pressure_delta:window.t('map.popup.pressure_delta'),
    precipitation: window.t('map.popup.precipitation'),
    snow_depth:    window.t('map.popup.snow'),
    foehn_active:  window.t('editor.fields.foehn_active'),
  };
  const FIELD_UNIT = {
    wind_speed:'km/h', wind_gust:'km/h', wind_direction:'°',
    temperature:'°C', humidity:'%', pressure:'hPa',
    pressure_delta:'hPa', precipitation:'mm', snow_depth:'cm',
    foehn_active:''
  };
  const DC_HEX = { green:'#68d391', orange:'#f6ad55', red:'#fc8181' };

  function condThreshold(cr) {
    const u = FIELD_UNIT[cr.field] || '';
    if (cr.operator === 'between')            return `${cr.value_a}–${cr.value_b} ${u}`;
    if (cr.operator === 'not_between')        return `not ${cr.value_a}–${cr.value_b} ${u}`;
    if (cr.operator === 'in_direction_range') return `${cr.value_a}°–${cr.value_b}°`;
    return `${cr.operator} ${cr.value_a} ${u}`;
  }

  function condActual(cr) {
    if (cr.actual_value == null) return `<span style="color:#4a5568">${window.t('map.popup.no_data')}</span>`;
    return `${cr.actual_value.toFixed(1)} ${FIELD_UNIT[cr.field] || ''}`;
  }

  function stationName(sid) {
    return (window._lentiStationsMap?.[sid]?.name) || sid;
  }

  function buildConditionRows(condResults) {
    if (!condResults || condResults.length === 0) return '';

    const groups = {};
    const standalone = [];
    for (const cr of condResults) {
      if (cr.group_id) (groups[cr.group_id] = groups[cr.group_id] || []).push(cr);
      else standalone.push(cr);
    }

    let html = `<div class="popup-cond-header">${window.t('map.popup.conditions')}</div>`;

    function renderCond(cr, isGroupMember, groupAllMatched) {
      const triggered = cr.matched && (isGroupMember ? groupAllMatched : true);
      const dotColor  = triggered ? DC_HEX[cr.result_colour] : '#4a5568';
      const label     = FIELD_LABEL[cr.field] || cr.field;
      const stn       = stationName(cr.station_id);
      return `<div class="popup-cond-row">
        <span style="color:${dotColor};font-size:0.7rem">●</span>
        <span class="popup-cond-text">
          <span style="color:#718096;font-size:0.68rem">${escHtml(stn)}</span>
          <span>${escHtml(label)} ${escHtml(condThreshold(cr))}</span>
          <span style="color:${triggered ? DC_HEX[cr.result_colour] : '#718096'}">${condActual(cr)}</span>
        </span>
      </div>`;
    }

    for (const cr of standalone) html += renderCond(cr, false, false);

    for (const [, crs] of Object.entries(groups)) {
      const allMatched = crs[0].group_all_matched;
      html += `<div class="popup-cond-group">
        <div class="popup-cond-group-label">${window.t('map.popup.condition_group')}${allMatched ? ' ' + window.t('map.popup.triggered') : ''}</div>`;
      for (const cr of crs) html += renderCond(cr, true, allMatched);
      html += '</div>';
    }

    return html;
  }

  function launchPopup(rs, dec) {
    const lc = decisionColor(dec.decision);
    const altLabel = rs.altitude_m != null ? ` · ${rs.altitude_m} m` : '';
    let landingRows = '';
    for (const ld of (dec.landing_decisions || [])) {
      landingRows += `<div class="popup-row"><span>⚑ ${escHtml(ld.name)}</span>
        <span style="color:${decisionColor(ld.decision)};font-weight:700">${ld.decision.toUpperCase()}</span></div>`;
    }
    return `
      <div class="popup-name">▲ ${escHtml(rs.name)}</div>
      <div class="popup-meta">${window.t('map.popup.launch')}${altLabel}</div>
      <div class="popup-row" style="margin-bottom:6px">
        <span>${window.t('map.popup.launch')}</span>
        <span style="color:${lc};font-weight:700">${dec.decision.toUpperCase()}</span>
      </div>
      ${landingRows}
      ${buildConditionRows(dec.condition_results)}
      <div style="display:flex;gap:8px;margin-top:10px">
        <a class="popup-link" href="/ruleset-analysis?id=${rs.id}">${window.t('map.popup.analysis')}</a>
        <a class="popup-link" style="background:#2d3748" href="/ruleset-editor?id=${rs.id}">${window.t('map.popup.edit')}</a>
      </div>`;
  }

  function landingPopup(rs, dec) {
    const lc = decisionColor(dec.decision);
    const altLabel = rs.altitude_m != null ? ` · ${rs.altitude_m} m` : '';
    return `
      <div class="popup-name">⚑ ${escHtml(rs.name)}</div>
      <div class="popup-meta">${window.t('map.popup.landing_zone')}${altLabel}</div>
      <div class="popup-row" style="margin-bottom:6px">
        <span>${window.t('map.popup.landable')}</span>
        <span style="color:${lc};font-weight:700">${dec.decision.toUpperCase()}</span>
      </div>
      ${buildConditionRows(dec.condition_results)}
      <div style="display:flex;gap:8px;margin-top:10px">
        <a class="popup-link" href="/ruleset-analysis?id=${rs.id}">${window.t('map.popup.analysis')}</a>
        <a class="popup-link" style="background:#2d3748" href="/ruleset-editor?id=${rs.id}">${window.t('map.popup.edit')}</a>
      </div>`;
  }

  function opportunityPopup(rs, dec) {
    const altLabel = rs.altitude_m != null ? ` · ${rs.altitude_m} m` : '';
    return `
      <div class="popup-name">✦ ${escHtml(rs.name)}</div>
      <div class="popup-meta">${window.t('map.popup.opportunity')}${altLabel}</div>
      <div class="popup-row" style="margin-bottom:6px">
        <span>${window.t('map.popup.status')}</span>
        <span style="color:#68d391;font-weight:700">GREEN</span>
      </div>
      ${buildConditionRows(dec.condition_results)}
      <div style="display:flex;gap:8px;margin-top:10px">
        <a class="popup-link" href="/ruleset-analysis?id=${rs.id}">${window.t('map.popup.analysis')}</a>
        <a class="popup-link" style="background:#2d3748" href="/ruleset-editor?id=${rs.id}">${window.t('map.popup.edit')}</a>
      </div>`;
  }

  // ── Marker layer ────────────────────────────────────────────────────────
  // Custom pane at z-index 450 — below the default markerPane (600) so
  // weather-arrow markers always render on top of ruleset dots.
  window._lentiMap.createPane('rulesetPane');
  window._lentiMap.getPane('rulesetPane').style.zIndex = 450;
  const rulesetLayer = L.layerGroup().addTo(window._lentiMap);

  async function loadRulesetMarkers() {
    const t0 = performance.now();
    console.log('[Lenti:index] loadRulesetMarkers start');
    try {
      const res = await fetchAuth('/api/rulesets');
      if (!res.ok) { console.warn('[Lenti:index] loadRulesetMarkers: /api/rulesets returned', res.status); return; }
      const rulesets = await res.json();
      const positioned = rulesets.filter(rs => rs.lat != null && rs.lon != null);
      console.log(`[Lenti:index] loadRulesetMarkers: ${rulesets.length} rulesets, ${positioned.length} positioned`);
      if (positioned.length === 0) return;

      const evaluations = await Promise.allSettled(
        positioned.map(rs => fetchAuth(`/api/rulesets/${rs.id}/evaluate`).then(r => r.ok ? r.json() : null))
      );

      rulesetLayer.clearLayers();

      let counts = { launch: 0, landing: 0, opportunity_shown: 0, opportunity_hidden: 0 };
      positioned.forEach((rs, i) => {
        const dec = evaluations[i].status === 'fulfilled' ? evaluations[i].value : null;
        if (!dec) return;

        if (rs.site_type === 'launch') {
          const haloColor = dec.landing_decisions?.length ? dec.best_landing_decision : null;
          L.marker([rs.lat, rs.lon], { icon: launchIcon(dec.decision, haloColor), pane: 'rulesetPane' })
            .addTo(rulesetLayer)
            .bindPopup(() => launchPopup(rs, dec), { maxWidth: 320 });
          counts.launch++;
        } else if (rs.site_type === 'opportunity') {
          // Opportunity markers only appear when fully GREEN — the "aha" effect
          if (dec.decision === 'green') {
            L.marker([rs.lat, rs.lon], { icon: opportunityIcon(), pane: 'rulesetPane' })
              .addTo(rulesetLayer)
              .bindPopup(() => opportunityPopup(rs, dec), { maxWidth: 300 });
            counts.opportunity_shown++;
          } else {
            counts.opportunity_hidden++;
            console.log(`[Lenti:index] opportunity "${rs.name}" hidden (decision=${dec.decision})`);
          }
        } else {
          L.marker([rs.lat, rs.lon], { icon: landingIcon(dec.decision), pane: 'rulesetPane' })
            .addTo(rulesetLayer)
            .bindPopup(() => landingPopup(rs, dec), { maxWidth: 300 });
          counts.landing++;
        }
      });

      console.log(`[Lenti:index] loadRulesetMarkers done in ${(performance.now() - t0).toFixed(0)} ms`, counts);
    } catch (err) {
      console.error('[Lenti:index] loadRulesetMarkers error:', err);
    }
  }

  loadRulesetMarkers();
  setInterval(loadRulesetMarkers, 60_000);

  } // end if (isLoggedIn())
</script>
</body>
</html>

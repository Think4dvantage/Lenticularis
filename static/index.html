<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lenticularis — Map</title>
  <!-- Leaflet.js -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Shared nav ─────────────────────────────────────────────── */
    .top-nav {
      background: #1a1f2e;
      border-bottom: 1px solid #2d3748;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      height: 48px;
    }

    .nav-brand {
      font-size: 1.1rem;
      font-weight: 600;
      color: #90cdf4;
      margin-right: 24px;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      gap: 2px;
      flex: 1;
    }

    .nav-link {
      color: #718096;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 6px 14px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .nav-link:hover { background: #2d3748; color: #e2e8f0; }
    .nav-link.active { background: #2d4a6e; color: #90cdf4; font-weight: 500; }

    .nav-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #718096;
    }

    .nav-user { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .nav-user-name { font-size: 0.85rem; color: #90cdf4; }
    .nav-btn { background: transparent; border: 1px solid #4a5568; color: #a0aec0; font-size: 0.8rem; padding: 4px 10px; border-radius: 5px; cursor: pointer; transition: background 0.15s; }
    .nav-btn:hover { background: #2d3748; color: #e2e8f0; }

    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.green { background: #48bb78; }
    .dot.grey  { background: #4a5568; }

    /* ── Map ────────────────────────────────────────────────────── */
    #map {
      flex: 1;
      width: 100%;
    }

    /* ── Replay bar ─────────────────────────────────────────────── */
    .replay-bar {
      background: #111827;
      border-top: 1px solid #2d3748;
      padding: 8px 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      font-size: 0.8rem;
    }

    .replay-section {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .replay-sep {
      width: 1px;
      height: 20px;
      background: #2d3748;
    }

    .replay-label {
      color: #718096;
      white-space: nowrap;
    }

    .rp-btn {
      background: #1a2035;
      border: 1px solid #4a5568;
      border-radius: 5px;
      color: #a0aec0;
      font-size: 0.78rem;
      padding: 3px 9px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .rp-btn:hover { background: #2d3748; color: #e2e8f0; }
    .rp-btn.active { background: #2b6cb0; border-color: #3182ce; color: #fff; }

    .rp-ctrl {
      background: #1a2035;
      border: 1px solid #4a5568;
      border-radius: 5px;
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 3px 8px;
      cursor: pointer;
      transition: background 0.12s;
      line-height: 1;
    }
    .rp-ctrl:hover { background: #2d3748; color: #e2e8f0; }
    .rp-ctrl.rp-play { background: #276749; border-color: #48bb78; color: #68d391; }
    .rp-ctrl.rp-play:hover { background: #2f855a; }

    .replay-time {
      color: #90cdf4;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      min-width: 140px;
    }

    .replay-scrubber {
      width: 180px;
      accent-color: #3182ce;
      cursor: pointer;
    }

    .replay-frame-label {
      color: #718096;
      white-space: nowrap;
      min-width: 80px;
    }

    .replay-status {
      color: #ed8936;
      font-size: 0.75rem;
    }
    .replay-status.playing { color: #68d391; }
    .replay-status.paused  { color: #90cdf4; }

    .replay-custom-inputs {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .replay-custom-inputs input[type="datetime-local"] {
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 5px;
      color: #e2e8f0;
      padding: 3px 8px;
      font-size: 0.78rem;
    }

    .replay-toggle-btn {
      background: transparent;
      border: 1px solid #4a5568;
      border-radius: 5px;
      color: #a0aec0;
      font-size: 0.8rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .replay-toggle-btn:hover { background: #2d3748; color: #e2e8f0; }
    .replay-toggle-btn.active { background: #2c5282; border-color: #3182ce; color: #90cdf4; }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper {
      background: #1a1f2e;
      color: #e2e8f0;
      border: 1px solid #2d3748;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip {
      background: #1a1f2e;
    }
    .leaflet-popup-content {
      margin: 12px 16px;
      font-size: 0.82rem;
      line-height: 1.6;
    }
    .popup-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #90cdf4;
      margin-bottom: 6px;
    }
    .popup-meta {
      color: #718096;
      font-size: 0.75rem;
      margin-bottom: 8px;
    }
    .popup-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: #a0aec0;
    }
    .popup-row span:last-child { color: #e2e8f0; font-weight: 500; }
    .popup-missing { color: #4a5568; }
    .popup-link {
      display: inline-block;
      margin-top: 10px;
      background: #2b6cb0;
      color: #fff !important;
      text-decoration: none;
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 0.8rem;
      transition: background 0.15s;
    }
    .popup-link:hover { background: #3182ce; color: #fff !important; }

    .network-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      vertical-align: middle;
    }
    .network-meteoswiss { background: #2a4365; color: #90cdf4; }
    .network-metar      { background: #2f855a; color: #c6f6d5; }
    .network-holfuy     { background: #22543d; color: #9ae6b4; }
    .network-slf        { background: #44337a; color: #d6bcfa; }
    .network-windline   { background: #1f4e5f; color: #b2f5ea; }
    .network-ecovitt    { background: #7b341e; color: #fbd38d; }
    .network-unknown    { background: #2d3748; color: #a0aec0; }
  </style>
</head>
<body>

<nav class="top-nav">
  <span class="nav-brand">🪁 Lenticularis</span>
  <div class="nav-links">
    <a href="/" class="nav-link active">Map</a>
    <a href="/stations" class="nav-link">Stations</a>
    <a href="/rulesets" class="nav-link">Rule Sets</a>
  </div>
  <div class="nav-status">
    <span class="dot grey" id="dbDot"></span>
    <span id="navStatus">Connecting…</span>
  </div>
  <button class="replay-toggle-btn" id="replayToggleBtn" onclick="replayToggleMode()" title="Toggle replay mode">▶ Replay</button>
  <div class="nav-user" id="navUser"></div>
</nav>

<div id="map"></div>

<!-- Replay bar — shown when replay mode is active -->
<div id="replayBar" class="replay-bar" style="display:none">
  <div class="replay-section">
    <span class="replay-label">Range:</span>
    <button class="rp-btn active" data-hours="6"   onclick="replaySetRange(6)">6h</button>
    <button class="rp-btn"       data-hours="24"  onclick="replaySetRange(24)">24h</button>
    <button class="rp-btn"       data-hours="168" onclick="replaySetRange(168)">7d</button>
    <button class="rp-btn"       id="mapCustomBtn" onclick="replayToggleCustom()">Custom</button>
    <div class="replay-custom-inputs" id="mapCustomInputs" style="display:none">
      <input type="datetime-local" id="mapRangeStart" />
      <span style="color:#718096">→</span>
      <input type="datetime-local" id="mapRangeEnd" />
      <button class="rp-btn" onclick="replayLoadCustom()">Load</button>
      <span id="mapDataHint" style="display:none;color:#718096;font-size:0.72rem;white-space:nowrap"></span>
    </div>
  </div>
  <div class="replay-sep"></div>
  <div class="replay-section">
    <span class="replay-label">Speed:</span>
    <button class="rp-btn active" data-speed="10"  onclick="replaySetSpeed(10)">10×</button>
    <button class="rp-btn"       data-speed="50"  onclick="replaySetSpeed(50)">50×</button>
    <button class="rp-btn"       data-speed="100" onclick="replaySetSpeed(100)">100×</button>
    <button class="rp-btn"       data-speed="200" onclick="replaySetSpeed(200)">200×</button>
    <button class="rp-btn"       data-speed="500" onclick="replaySetSpeed(500)">500×</button>
  </div>
  <div class="replay-sep"></div>
  <div class="replay-section">
    <button class="rp-ctrl" onclick="_mapReplay.seekFirst()"   title="First">⏮</button>
    <button class="rp-ctrl" onclick="_mapReplay.stepBack()"    title="Previous">⏪</button>
    <button class="rp-ctrl" id="mapPlayBtn" onclick="_mapReplay.toggle()" title="Play/Pause">▶</button>
    <button class="rp-ctrl" onclick="_mapReplay.stepForward()" title="Next">⏩</button>
    <button class="rp-ctrl" onclick="_mapReplay.seekLast()"    title="Last">⏭</button>
  </div>
  <div class="replay-sep"></div>
  <div class="replay-section" style="flex:1;min-width:260px">
    <span class="replay-time" id="mapReplayTime">—</span>
    <input type="range" id="mapScrubber" class="replay-scrubber" min="0" max="100" value="0"
           oninput="_mapReplay.seekTo(+this.value)" style="flex:1" />
    <span class="replay-frame-label" id="mapFrameLabel">—</span>
  </div>
  <div class="replay-sep"></div>
  <div class="replay-section">
    <span class="replay-status" id="mapReplayStatus">—</span>
  </div>
</div>

<script src="/static/replay.js"></script>
<script src="/static/map.js"></script>
<script>
// ---------------------------------------------------------------------------
// Replay bar — map page
// ---------------------------------------------------------------------------
let _mapReplayActive = false;
let _mapReplayRange  = 6;
let _mapReplaySpeed  = 10;

const _mapReplay = new ReplayEngine(
  // onFrame
  (snapshot, ts, idx, total) => {
    applyReplaySnapshot(snapshot);
    // Update UI
    const d = new Date(ts);
    document.getElementById('mapReplayTime').textContent =
      d.toLocaleString([], { month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit', timeZoneName:'short' });
    const scrubber = document.getElementById('mapScrubber');
    scrubber.max = total - 1;
    scrubber.value = idx;
    document.getElementById('mapFrameLabel').textContent = `${idx + 1} / ${total}`;
  },
  // onStateChange
  (state) => {
    const statusEl = document.getElementById('mapReplayStatus');
    const playBtn  = document.getElementById('mapPlayBtn');
    if (state === 'loading') {
      statusEl.textContent = 'Loading…';
      statusEl.className = 'replay-status';
      playBtn.textContent = '▶';
      playBtn.classList.remove('rp-play');
    } else if (state === 'playing') {
      statusEl.textContent = '● Playing';
      statusEl.className = 'replay-status playing';
      playBtn.textContent = '⏸';
      playBtn.classList.add('rp-play');
    } else if (state === 'paused') {
      statusEl.textContent = '⏸ Paused';
      statusEl.className = 'replay-status paused';
      playBtn.textContent = '▶';
      playBtn.classList.remove('rp-play');
    } else {
      statusEl.textContent = '—';
      statusEl.className = 'replay-status';
      playBtn.textContent = '▶';
      playBtn.classList.remove('rp-play');
    }
  }
);

async function replayToggleMode() {
  const btn = document.getElementById('replayToggleBtn');
  const bar = document.getElementById('replayBar');
  _mapReplayActive = !_mapReplayActive;
  if (_mapReplayActive) {
    btn.textContent = '✕ Live';
    btn.classList.add('active');
    bar.style.display = 'flex';
    stopLiveRefresh();
    await replayLoad();
  } else {
    _mapReplay.pause();
    btn.textContent = '▶ Replay';
    btn.classList.remove('active');
    bar.style.display = 'none';
    loadStations();
    startLiveRefresh();
  }
}

function replaySetRange(hours) {
  _mapReplayRange = hours;
  document.querySelectorAll('#replayBar [data-hours]').forEach(b =>
    b.classList.toggle('active', +b.dataset.hours === hours));
  document.getElementById('mapCustomBtn').classList.remove('active');
  document.getElementById('mapCustomInputs').style.display = 'none';
  if (_mapReplayActive) replayLoad();
}

async function replayToggleCustom() {
  const inp = document.getElementById('mapCustomInputs');
  const showing = inp.style.display !== 'none';
  inp.style.display = showing ? 'none' : 'flex';
  document.getElementById('mapCustomBtn').classList.toggle('active', !showing);
  if (!showing) await replayApplyDataBounds('mapRangeStart', 'mapRangeEnd', 'mapDataHint');
}

// Convert a UTC ISO string to the "YYYY-MM-DDTHH:MM" LOCAL-time string
// required by datetime-local input min/max/value attributes.
function utcToLocalInputValue(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  // Subtract getTimezoneOffset (minutes behind UTC) to get local wall-clock time
  return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
}

async function replayApplyDataBounds(startId, endId, hintId) {
  try {
    const res = await fetch('/api/stations/data-bounds');
    if (!res.ok) return;
    const { earliest, latest } = await res.json();
    if (!earliest || !latest) return;

    const startEl = document.getElementById(startId);
    const endEl   = document.getElementById(endId);
    const eLocal  = utcToLocalInputValue(earliest);
    const lLocal  = utcToLocalInputValue(latest);

    startEl.min = eLocal;
    startEl.max = lLocal;
    endEl.min   = eLocal;
    endEl.max   = lLocal;

    // Pre-fill only if still empty
    if (!startEl.value) startEl.value = eLocal;
    if (!endEl.value)   endEl.value   = lLocal;

    // Show hint
    if (hintId) {
      const hint = document.getElementById(hintId);
      if (hint) {
        const fmt = iso => new Date(iso).toLocaleString([], { month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit' });
        hint.textContent = `Data: ${fmt(earliest)} → ${fmt(latest)}`;
        hint.style.display = 'inline';
      }
    }
  } catch (e) { /* silently ignore */ }
}

async function replayLoadCustom() {
  const s = document.getElementById('mapRangeStart').value;
  const e = document.getElementById('mapRangeEnd').value;
  if (!s || !e) { alert('Please select both start and end date/time.'); return; }
  document.querySelectorAll('#replayBar [data-hours]').forEach(b => b.classList.remove('active'));
  await replayLoad({ start: new Date(s).toISOString(), end: new Date(e).toISOString() });
}

function replaySetSpeed(speed) {
  _mapReplaySpeed = speed;
  document.querySelectorAll('#replayBar [data-speed]').forEach(b =>
    b.classList.toggle('active', +b.dataset.speed === speed));
  _mapReplay.setSpeed(speed);
}

async function replayLoad(params) {
  _mapReplay.pause();
  try {
    const count = await _mapReplay.load(params || { hours: _mapReplayRange });
    document.getElementById('mapFrameLabel').textContent = `0 / ${count}`;
    if (count === 0) {
      document.getElementById('mapReplayStatus').textContent = 'No data';
    }
  } catch (err) {
    console.error('Replay load error:', err);
    document.getElementById('mapReplayStatus').textContent = 'Error loading data';
  }
}
</script>
<script type="module">
  import { renderNavAuth, isLoggedIn, fetchAuth } from '/static/auth.js';
  renderNavAuth('map');

  if (isLoggedIn()) {

  // ── Decision colour palette ─────────────────────────────────────────────
  const DC = { green: '#68d391', orange: '#f6ad55', red: '#fc8181', null: '#4a5568' };

  function decisionColor(d) { return DC[d] ?? DC.null; }

  function bestLanding(landingDecisions) {
    for (const c of ['green', 'orange', 'red']) {
      if (landingDecisions.some(d => d.decision === c)) return c;
    }
    return null;
  }

  // ── Marker icons ────────────────────────────────────────────────────────
  function launchIcon(launchColor, haloColor) {
    const lc = decisionColor(launchColor);
    const halo = haloColor
      ? `<circle cx="24" cy="24" r="21" fill="none" stroke="${decisionColor(haloColor)}" stroke-width="5" opacity="0.8"/>`
      : '';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
      ${halo}
      <circle cx="24" cy="24" r="13" fill="${lc}" fill-opacity="0.92"/>
      <text x="24" y="29" font-size="13" text-anchor="middle" fill="#000" opacity="0.7">▲</text>
    </svg>`;
    return L.divIcon({ html: svg, className: '', iconSize: [48, 48], iconAnchor: [24, 24], popupAnchor: [0, -26] });
  }

  function landingIcon(color) {
    const c = decisionColor(color);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="32" viewBox="0 0 24 32">
      <line x1="4" y1="2" x2="4" y2="30" stroke="${c}" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="4,3 22,10 4,17" fill="${c}" fill-opacity="0.85"/>
    </svg>`;
    return L.divIcon({ html: svg, className: '', iconSize: [24, 32], iconAnchor: [4, 30], popupAnchor: [10, -30] });
  }

  // ── Popup HTML ──────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function launchPopup(rs, dec) {
    const lc = decisionColor(dec.decision);
    const altLabel = rs.altitude_m != null ? ` · ${rs.altitude_m} m` : '';
    let landingRows = '';
    for (const ld of (dec.landing_decisions || [])) {
      landingRows += `<div class="popup-row"><span>⚑ ${escHtml(ld.name)}</span>
        <span style="color:${decisionColor(ld.decision)};font-weight:700">${ld.decision.toUpperCase()}</span></div>`;
    }
    return `
      <div class="popup-name">▲ ${escHtml(rs.name)}</div>
      <div class="popup-meta">Launch${altLabel}</div>
      <div class="popup-row" style="margin-bottom:6px">
        <span>Launch</span>
        <span style="color:${lc};font-weight:700">${dec.decision.toUpperCase()}</span>
      </div>
      ${landingRows}
      <a class="popup-link" href="/ruleset-editor?id=${rs.id}">Edit →</a>`;
  }

  function landingPopup(rs, dec) {
    const lc = decisionColor(dec.decision);
    const altLabel = rs.altitude_m != null ? ` · ${rs.altitude_m} m` : '';
    return `
      <div class="popup-name">⚑ ${escHtml(rs.name)}</div>
      <div class="popup-meta">Landing zone${altLabel}</div>
      <div class="popup-row" style="margin-bottom:6px">
        <span>Landable</span>
        <span style="color:${lc};font-weight:700">${dec.decision.toUpperCase()}</span>
      </div>
      <a class="popup-link" href="/ruleset-editor?id=${rs.id}">Edit →</a>`;
  }

  // ── Marker layer ────────────────────────────────────────────────────────
  const rulesetLayer = L.layerGroup().addTo(window._lentiMap);

  async function loadRulesetMarkers() {
    try {
      const res = await fetchAuth('/api/rulesets');
      if (!res.ok) return;
      const rulesets = await res.json();
      const positioned = rulesets.filter(rs => rs.lat != null && rs.lon != null);
      if (positioned.length === 0) return;

      // Evaluate all in parallel
      const evaluations = await Promise.allSettled(
        positioned.map(rs => fetchAuth(`/api/rulesets/${rs.id}/evaluate`).then(r => r.ok ? r.json() : null))
      );

      rulesetLayer.clearLayers();

      positioned.forEach((rs, i) => {
        const dec = evaluations[i].status === 'fulfilled' ? evaluations[i].value : null;
        if (!dec) return;

        if (rs.site_type === 'launch') {
          const haloColor = dec.landing_decisions?.length ? dec.best_landing_decision : null;
          L.marker([rs.lat, rs.lon], { icon: launchIcon(dec.decision, haloColor), zIndexOffset: 500 })
            .addTo(rulesetLayer)
            .bindPopup(launchPopup(rs, dec), { maxWidth: 280 });
        } else {
          L.marker([rs.lat, rs.lon], { icon: landingIcon(dec.decision), zIndexOffset: 400 })
            .addTo(rulesetLayer)
            .bindPopup(landingPopup(rs, dec), { maxWidth: 240 });
        }
      });
    } catch (err) {
      console.error('Failed to load ruleset markers:', err);
    }
  }

  loadRulesetMarkers();
  setInterval(loadRulesetMarkers, 60_000);

  } // end if (isLoggedIn())
</script>
</body>
</html>

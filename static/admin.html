<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lenticularis — Admin</title>
  <link rel="stylesheet" href="/static/shared.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── Nav ── */
    .top-nav { background: #1a1f2e; border-bottom: 1px solid #2d3748; padding: 0 24px; display: flex; align-items: center; flex-shrink: 0; height: 48px; }
    .nav-brand { font-size: 1.1rem; font-weight: 600; color: #90cdf4; margin-right: 24px; white-space: nowrap; text-decoration: none; }
    .nav-links { display: flex; gap: 2px; flex: 1; }
    .nav-link { color: #718096; text-decoration: none; font-size: 0.85rem; padding: 6px 14px; border-radius: 6px; transition: background 0.15s, color 0.15s; }
    .nav-link:hover { background: #2d3748; color: #e2e8f0; }
    .nav-link.active { background: #2d4a6e; color: #90cdf4; font-weight: 500; }
    .nav-user { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .nav-btn { background: transparent; border: 1px solid #4a5568; color: #a0aec0; font-size: 0.8rem; padding: 4px 10px; border-radius: 5px; cursor: pointer; transition: background 0.15s; }
    .nav-btn:hover { background: #2d3748; color: #e2e8f0; }
    #navLangPicker { display: flex; gap: 2px; margin-left: 8px; }
    .lang-btn { background: transparent; border: 1px solid #4a5568; color: #718096; font-size: 0.72rem; padding: 3px 7px; border-radius: 4px; cursor: pointer; transition: background 0.15s; }
    .lang-btn:hover { background: #2d3748; color: #e2e8f0; }
    .lang-btn.active { background: #2d4a6e; color: #90cdf4; border-color: #4a7bab; }

    /* ── Layout ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; width: 100%; }
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 1.4rem; font-weight: 600; }
    .page-header p { color: #718096; font-size: 0.85rem; margin-top: 4px; }

    /* ── Auth gate ── */
    .auth-gate { display: none; text-align: center; padding: 60px 20px; }
    .auth-gate.visible { display: block; }
    .auth-gate p { color: #718096; margin-bottom: 16px; }

    /* ── Tabs ── */
    .tab-bar { display: flex; gap: 4px; border-bottom: 1px solid #2d3748; margin-bottom: 28px; }
    .tab-btn {
      padding: 10px 20px; font-size: 0.88rem; font-weight: 500; cursor: pointer; border: none;
      background: transparent; color: #718096; border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s; margin-bottom: -1px; white-space: nowrap;
    }
    .tab-btn:hover { color: #e2e8f0; }
    .tab-btn.active { color: #90cdf4; border-bottom-color: #90cdf4; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Table ── */
    .table-wrap { overflow-x: visible; }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    th { text-align: left; padding: 8px 12px; color: #718096; font-weight: 500; border-bottom: 1px solid #2d3748; white-space: nowrap; }
    td { padding: 10px 12px; border-bottom: 1px solid #1e2533; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #151b27; }

    /* ── Controls ── */
    select.role-select {
      background: #1a2035; border: 1px solid #2d3748; color: #e2e8f0;
      border-radius: 5px; padding: 4px 8px; font-size: 0.82rem; cursor: pointer;
    }
    select.role-select:disabled { opacity: 0.45; cursor: default; }
    .toggle-wrap { display: flex; align-items: center; }
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #2d3748; border-radius: 20px; transition: background 0.2s;
    }
    .slider::before {
      content: ''; position: absolute; height: 14px; width: 14px;
      left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s;
    }
    input:checked + .slider { background: #3182ce; }
    input:checked + .slider::before { transform: translateX(16px); }
    input:disabled + .slider { opacity: 0.4; cursor: default; }

    .interval-input {
      width: 70px; background: #1a2035; border: 1px solid #2d3748; color: #e2e8f0;
      border-radius: 5px; padding: 4px 8px; font-size: 0.82rem; text-align: center;
    }
    .interval-input:disabled { opacity: 0.45; }

    .trigger-btn {
      background: transparent; border: 1px solid #2d4a6e; color: #90cdf4;
      border-radius: 5px; padding: 3px 9px; font-size: 0.8rem; cursor: pointer; transition: background 0.15s;
    }
    .trigger-btn:hover { background: #1a3050; }
    .trigger-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Status badges ── */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 500;
    }
    .badge-ok       { background: #1c4532; color: #68d391; }
    .badge-ok_no_data { background: #1c4532; color: #68d391; }
    .badge-error    { background: #4a1515; color: #fc8181; }
    .badge-running  { background: #3d3010; color: #f6e05e; }
    .badge-pending  { background: #2d3748; color: #a0aec0; }
    .badge-scheduled { background: #2d3748; color: #a0aec0; }
    .badge-disabled { background: #1a1f2e; color: #4a5568; }
    .badge-unknown_collector { background: #4a1515; color: #fc8181; }

    /* ── Note ── */
    .note { font-size: 0.78rem; color: #718096; margin-top: 16px; }

    /* ── You tag ── */
    .you-tag { font-size: 0.72rem; color: #718096; margin-left: 4px; }

    /* ── Error msg ── */
    .error-msg { color: #fc8181; font-size: 0.82rem; margin-top: 12px; }
    .empty-msg  { color: #718096; font-size: 0.85rem; padding: 20px 0; }

    .btn-primary { background: #3182ce; color: #fff; border: none; border-radius: 6px; padding: 8px 20px; font-size: 0.88rem; cursor: pointer; font-weight: 500; }
    .btn-primary:hover { background: #2b6cb0; }
    .btn-secondary { background: transparent; border: 1px solid #4a5568; color: #a0aec0; border-radius: 6px; padding: 7px 16px; font-size: 0.85rem; cursor: pointer; }
    .btn-secondary:hover { background: #2d3748; color: #e2e8f0; }
    .btn-add { background: transparent; border: 1px solid #2d4a6e; color: #90cdf4; border-radius: 5px; padding: 5px 14px; font-size: 0.82rem; cursor: pointer; margin-top: 10px; }
    .btn-add:hover { background: #1a3050; }
    .btn-danger-sm { background: transparent; border: 1px solid #742a2a; color: #fc8181; border-radius: 5px; padding: 3px 10px; font-size: 0.8rem; cursor: pointer; }
    .btn-danger-sm:hover { background: #4a1515; }
    .btn-remove { background: transparent; border: none; color: #718096; font-size: 0.82rem; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
    .btn-remove:hover { color: #fc8181; background: #4a1515; }
    .saved-msg { color: #68d391; font-size: 0.85rem; }
    .fi { background: #0f1117; border: 1px solid #2d3748; color: #e2e8f0; border-radius: 5px; padding: 5px 8px; font-size: 0.82rem; }
    .fi:focus { outline: none; border-color: #4a7bab; }
    .fi.key-field { width: 120px; }
    .fi.label-field { width: 160px; }
    .fi.desc-field { flex: 1; min-width: 200px; }
    .fi.narrow { width: 80px; }
    .fi.medium { width: 140px; }
    .fi.wide { width: 200px; }
    .conditions-table th { font-size: 0.78rem; }
    .conditions-table td { padding: 6px 8px; }
    .conditions-table input { width: 100%; }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="/" class="nav-brand">🪁 Lenticularis</a>
  <div class="nav-links">
    <a href="/" class="nav-link" data-i18n="nav.map"></a>
    <a href="/stations" class="nav-link" data-i18n="nav.stations"></a>
    <a href="/rulesets" class="nav-link" data-i18n="nav.rulesets"></a>
    <a href="/stats" class="nav-link" data-i18n="nav.stats"></a>
    <a href="/foehn" class="nav-link" data-i18n="nav.foehn"></a>
    <a href="/help" class="nav-link" data-i18n="nav.help"></a>
    <a href="/admin" class="nav-link active" data-i18n="nav.admin"></a>
  </div>
  <div class="nav-user" id="navUser"></div>
  <div id="navLangPicker"></div>
</nav>

<div class="page">
  <!-- Access denied -->
  <div class="auth-gate" id="authGate">
    <p id="authGateMsg" data-i18n="admin.access_denied"></p>
  </div>

  <!-- Admin content -->
  <div id="adminContent" style="display:none">
    <div class="page-header">
      <h1 data-i18n="admin.title"></h1>
      <p data-i18n="admin.subtitle"></p>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('users')" id="tab-users" data-i18n="admin.tabs.users"></button>
      <button class="tab-btn" onclick="switchTab('collectors')" id="tab-collectors" data-i18n="admin.tabs.collectors"></button>
<button class="tab-btn" onclick="switchTab('presets')" id="tab-presets" data-i18n="admin.tabs.presets"></button>
      <button class="tab-btn" onclick="switchTab('orgs')" id="tab-orgs" data-i18n="admin.tabs.orgs"></button>
      <button class="tab-btn" onclick="switchTab('station_dedup')" id="tab-station_dedup" data-i18n="admin.tabs.station_dedup"></button>
    </div>

    <!-- Users tab -->
    <div class="tab-panel active" id="panel-users">
      <div id="usersError" class="error-msg" style="display:none"></div>
      <div class="table-wrap">
        <table id="usersTable">
          <thead>
            <tr>
              <th data-i18n="admin.users.col_name"></th>
              <th data-i18n="admin.users.col_email"></th>
              <th data-i18n="admin.users.col_role"></th>
              <th data-i18n="admin.users.col_org"></th>
              <th data-i18n="admin.users.col_active"></th>
              <th data-i18n="admin.users.col_password"></th>
              <th data-i18n="admin.users.col_created"></th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="7" class="empty-msg" data-i18n="common.loading"></td></tr>
          </tbody>
        </table>
      </div>
      <div id="userCount" class="note"></div>
    </div>

    <!-- Organisations tab -->
    <div class="tab-panel" id="panel-orgs">
      <div id="orgsError" class="error-msg" style="display:none"></div>
      <div style="margin-bottom:24px; background:#1a1f2e; border:1px solid #2d3748; border-radius:8px; padding:20px;">
        <div style="font-weight:600; margin-bottom:12px; font-size:0.9rem;" data-i18n="admin.orgs.create_title"></div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
          <div>
            <label style="display:block; font-size:0.78rem; color:#718096; margin-bottom:4px;" data-i18n="admin.orgs.col_slug"></label>
            <input id="orgSlugInput" class="fi medium" type="text" style="width:140px">
          </div>
          <div>
            <label style="display:block; font-size:0.78rem; color:#718096; margin-bottom:4px;" data-i18n="admin.orgs.col_name"></label>
            <input id="orgNameInput" class="fi medium" type="text" style="width:220px">
          </div>
          <div>
            <label style="display:block; font-size:0.78rem; color:#718096; margin-bottom:4px;" data-i18n="admin.orgs.col_description"></label>
            <input id="orgDescInput" class="fi medium" type="text" style="width:240px">
          </div>
          <button class="btn-primary" id="orgCreateBtn" onclick="createOrg()" data-i18n="admin.orgs.create_btn"></button>
        </div>
        <div class="note" style="margin-top:8px;" data-i18n="admin.orgs.slug_hint"></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="admin.orgs.col_slug"></th>
              <th data-i18n="admin.orgs.col_name"></th>
              <th data-i18n="admin.orgs.col_description"></th>
              <th data-i18n="admin.orgs.col_created"></th>
              <th>Dashboard</th>
            </tr>
          </thead>
          <tbody id="orgsBody">
            <tr><td colspan="5" class="empty-msg" data-i18n="common.loading"></td></tr>
          </tbody>
        </table>
      </div>
      <div id="orgsCount" class="note"></div>
    </div>

    <!-- Collectors tab -->
    <div class="tab-panel" id="panel-collectors">
      <div id="collectorsError" class="error-msg" style="display:none"></div>
      <div class="table-wrap">
        <table id="collectorsTable">
          <thead>
            <tr>
              <th data-i18n="admin.collectors.col_collector"></th>
              <th data-i18n="admin.collectors.col_type"></th>
              <th data-i18n="admin.collectors.col_enabled"></th>
              <th data-i18n="admin.collectors.col_interval"></th>
              <th data-i18n="admin.collectors.col_status"></th>
              <th data-i18n="admin.collectors.col_last_success"></th>
              <th data-i18n="admin.collectors.col_last_error"></th>
              <th data-i18n="admin.collectors.col_failures"></th>
              <th data-i18n="admin.collectors.col_next_run"></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="collectorsBody">
            <tr><td colspan="9" class="empty-msg" data-i18n="common.loading"></td></tr>
          </tbody>
        </table>
      </div>
      <div class="note" data-i18n="admin.collectors.temporary_note"></div>
    </div>

    <!-- Presets tab -->
    <div class="tab-panel" id="panel-presets">
      <div id="presetsError" class="error-msg" style="display:none"></div>
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap;">
        <p class="note" style="margin:0" data-i18n="admin.presets.hint"></p>
      </div>
      <div class="table-wrap">
        <table id="presetsTable">
          <thead>
            <tr>
              <th data-i18n="admin.presets.col_name"></th>
              <th data-i18n="admin.presets.col_description"></th>
              <th data-i18n="admin.presets.col_conditions"></th>
              <th data-i18n="admin.presets.col_webcams"></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="presetsBody">
            <tr><td colspan="5" class="empty-msg" data-i18n="common.loading"></td></tr>
          </tbody>
        </table>
      </div>
      <div id="presetsCount" class="note"></div>
    </div>

    <!-- Station Dedup tab -->
    <div class="tab-panel" id="panel-station_dedup">
      <div id="dedupError" class="error-msg" style="display:none"></div>
      <p style="color:#a0aec0;margin-bottom:20px" data-i18n="admin.station_dedup.subtitle"></p>

      <div class="table-wrap" style="margin-bottom:24px">
        <table id="dedupTable">
          <thead>
            <tr>
              <th data-i18n="admin.station_dedup.col_station_a"></th>
              <th data-i18n="admin.station_dedup.col_station_b"></th>
              <th data-i18n="admin.station_dedup.col_note"></th>
              <th data-i18n="admin.station_dedup.col_actions"></th>
            </tr>
          </thead>
          <tbody id="dedupBody">
            <tr><td colspan="4" class="empty-msg" data-i18n="admin.station_dedup.no_pairs"></td></tr>
          </tbody>
        </table>
      </div>

      <div class="region-card" style="max-width:640px">
        <div class="foehn-section-title" data-i18n="admin.station_dedup.add_pair"></div>
        <div style="display:grid;gap:10px;margin-top:12px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <select id="dedupStationA" style="background:#0f1117;color:#e2e8f0;border:1px solid #2d3748;border-radius:6px;padding:8px 10px;font-size:0.9rem">
              <option value="" data-i18n="admin.station_dedup.select_station"></option>
            </select>
            <select id="dedupStationB" style="background:#0f1117;color:#e2e8f0;border:1px solid #2d3748;border-radius:6px;padding:8px 10px;font-size:0.9rem">
              <option value="" data-i18n="admin.station_dedup.select_station"></option>
            </select>
          </div>
          <input id="dedupNote" type="text" style="background:#0f1117;color:#e2e8f0;border:1px solid #2d3748;border-radius:6px;padding:8px 10px;font-size:0.9rem" data-i18n-placeholder="admin.station_dedup.note_placeholder">
          <div style="display:flex;align-items:center;gap:12px">
            <button class="btn-primary" onclick="addDedupPair()" data-i18n="admin.station_dedup.add_pair"></button>
            <span id="dedupSavedMsg" class="saved-msg" style="display:none" data-i18n="admin.station_dedup.saved"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initI18n, renderLangPicker, applyDataI18n } from '/static/i18n.js';
import { renderNavAuth, getUser, fetchAuth } from '/static/auth.js';

await initI18n();
document.dispatchEvent(new CustomEvent('i18nReady'));
renderNavAuth('admin');
renderLangPicker();

const user = getUser();

if (!user || user.role !== 'admin') {
  document.getElementById('authGate').classList.add('visible');
} else {
  document.getElementById('adminContent').style.display = 'block';
  loadUsers();
  loadCollectors();
  // Auto-refresh collectors every 30s
  setInterval(loadCollectors, 30_000);
}

// ---------------------------------------------------------------------------
// Tab switching
// ---------------------------------------------------------------------------
let _presetsLoaded = false;
let _orgsLoaded = false;
let _dedupLoaded = false;
window.switchTab = function(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === `tab-${name}`));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${name}`));
  if (name === 'presets' && !_presetsLoaded) {
    _presetsLoaded = true;
    loadPresets();
  }
  if (name === 'orgs' && !_orgsLoaded) {
    _orgsLoaded = true;
    loadOrgs();
  }
  if (name === 'station_dedup' && !_dedupLoaded) {
    _dedupLoaded = true;
    loadDedupOverrides();
    loadStationsForDedup();
  }
};

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function fmtDate(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleString([], { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
  } catch { return iso; }
}

function ageSince(iso) {
  if (!iso) return '—';
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 60)  return window.t('common.n_seconds_ago', { n: diff });
  if (diff < 3600) return window.t('common.n_minutes_ago', { n: Math.floor(diff / 60) });
  if (diff < 86400) return window.t('common.n_hours_ago', { n: Math.floor(diff / 3600) });
  return window.t('common.n_days_ago', { n: Math.floor(diff / 86400) });
}

// ---------------------------------------------------------------------------
// Users
// ---------------------------------------------------------------------------
let _orgList = [];

async function loadUsers() {
  // Fetch orgs first so the dropdown is populated when rendering users
  const orgRes = await fetchAuth('/api/admin/orgs');
  if (orgRes.ok) {
    const od = await orgRes.json();
    _orgList = od.orgs || [];
  }

  const res = await fetchAuth('/api/admin/users');
  if (!res.ok) {
    document.getElementById('usersError').style.display = 'block';
    document.getElementById('usersError').textContent = `Error ${res.status}`;
    return;
  }
  const data = await res.json();
  renderUsers(data.users, data.total);
}

function renderUsers(users, total) {
  document.getElementById('userCount').textContent = window.t('admin.users.total', { n: total });

  if (!users.length) {
    document.getElementById('usersBody').innerHTML =
      `<tr><td colspan="6" class="empty-msg">${window.t('admin.users.no_users')}</td></tr>`;
    return;
  }

  const roleLabels = {
    pilot:     window.t('admin.users.role_pilot'),
    customer:  window.t('admin.users.role_customer'),
    admin:     window.t('admin.users.role_admin'),
    org_admin: window.t('admin.users.role_org_admin'),
    org_pilot: window.t('admin.users.role_org_pilot'),
  };

  // Build org options from cached org list
  const orgOpts = [
    `<option value="">${window.t('admin.users.no_org')}</option>`,
    ..._orgList.map(o => `<option value="${escHtml(o.id)}">${escHtml(o.name)}</option>`),
  ].join('');

  document.getElementById('usersBody').innerHTML = users.map(u => {
    const isMe = u.id === user.id;
    const youTag = isMe ? `<span class="you-tag">${window.t('admin.users.you')}</span>` : '';
    const roleOpts = ['pilot', 'customer', 'admin', 'org_admin', 'org_pilot'].map(r =>
      `<option value="${r}" ${u.role === r ? 'selected' : ''}>${roleLabels[r]}</option>`
    ).join('');
    const orgOptsForUser = orgOpts.replace(
      `value="${escHtml(u.org_id || '')}"`,
      `value="${escHtml(u.org_id || '')}" selected`
    );

    return `<tr>
      <td>${escHtml(u.display_name)}${youTag}</td>
      <td>${escHtml(u.email)}</td>
      <td>
        <select class="role-select" data-user-id="${u.id}" onchange="updateUserRole(this)"
          ${isMe ? 'disabled' : ''}>
          ${roleOpts}
        </select>
      </td>
      <td>
        <select class="role-select" data-user-id="${u.id}" onchange="updateUserOrg(this)">
          ${orgOptsForUser}
        </select>
      </td>
      <td>
        <label class="toggle">
          <input type="checkbox" ${u.is_active ? 'checked' : ''} ${isMe ? 'disabled' : ''}
            onchange="updateUserActive(this, '${u.id}')">
          <span class="slider"></span>
        </label>
      </td>
      <td>${u.has_password ? window.t('admin.users.auth_local') : window.t('admin.users.auth_oauth')}</td>
      <td>${fmtDate(u.created_at)}</td>
    </tr>`;

}

// ---------------------------------------------------------------------------
// Collectors
// ---------------------------------------------------------------------------
async function loadCollectors() {
  const res = await fetchAuth('/api/admin/collectors');
  if (!res.ok) {
    document.getElementById('collectorsError').style.display = 'block';
    document.getElementById('collectorsError').textContent = `Error ${res.status}`;
    return;
  }
  const data = await res.json();
  renderCollectors(data.collectors);
}

function renderCollectors(collectors) {
  if (!collectors.length) {
    document.getElementById('collectorsBody').innerHTML =
      `<tr><td colspan="9" class="empty-msg">${window.t('admin.collectors.no_collectors')}</td></tr>`;
    return;
  }

  document.getElementById('collectorsBody').innerHTML = collectors.map(c => {
    const isDerived = c.type === 'derived';
    const healthKey = c.type === 'forecast'
      ? `forecast_${c.collector}`
      : c.collector;

    const lastErr = c.last_error
      ? `<span title="${escHtml(c.last_error)}">${ageSince(c.last_error_at)}</span>`
      : '—';

    return `<tr>
      <td><strong>${escHtml(c.collector)}</strong></td>
      <td>${escHtml(c.type)}</td>
      <td>
        <label class="toggle">
          <input type="checkbox" ${c.enabled ? 'checked' : ''} ${isDerived ? 'disabled' : ''}
            onchange="updateCollectorEnabled(this, '${escHtml(healthKey)}')">
          <span class="slider"></span>
        </label>
      </td>
      <td>
        <input class="interval-input" type="number" min="1" max="1440"
          value="${c.interval_minutes ?? ''}"
          ${isDerived ? 'disabled' : ''}
          data-health-key="${escHtml(healthKey)}"
          onblur="updateCollectorInterval(this)">
      </td>
      <td><span class="badge badge-${escHtml(c.status)}">${escHtml(c.status)}</span></td>
      <td>${ageSince(c.last_success_at)}</td>
      <td>${lastErr}</td>
      <td>${c.consecutive_failures || 0}</td>
      <td>${fmtDate(c.next_run_time)}</td>
      <td>
        <button class="trigger-btn" data-health-key="${escHtml(healthKey)}"
          onclick="triggerCollector(this)" title="Run now">▶</button>
      </td>
    </tr>`;
  }).join('');
}

window.updateCollectorEnabled = async function(checkbox, healthKey) {
  const res = await fetchAuth(`/api/admin/collectors/${healthKey}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ enabled: checkbox.checked }),
  });
  if (!res.ok) {
    checkbox.checked = !checkbox.checked;
    const err = await res.json().catch(() => ({}));
    document.getElementById('collectorsError').style.display = 'block';
    document.getElementById('collectorsError').textContent = err.detail || `Error ${res.status}`;
  } else {
    document.getElementById('collectorsError').style.display = 'none';
    await loadCollectors();
  }
};

window.triggerCollector = async function(btn) {
  const healthKey = btn.dataset.healthKey;
  btn.disabled = true;
  btn.textContent = '…';
  const res = await fetchAuth(`/api/admin/collectors/${healthKey}/trigger`, { method: 'POST' });
  if (!res.ok) {
    btn.textContent = '✕';
    btn.title = `Error ${res.status}`;
    setTimeout(() => { btn.disabled = false; btn.textContent = '▶'; btn.title = 'Run now'; }, 3000);
  } else {
    btn.textContent = '✓';
    setTimeout(async () => {
      btn.disabled = false; btn.textContent = '▶'; btn.title = 'Run now';
      await loadCollectors();
    }, 2000);
  }
};

window.updateCollectorInterval = async function(input) {
  const val = parseInt(input.value, 10);
  if (!val || val < 1) return;
  const healthKey = input.dataset.healthKey;
  const res = await fetchAuth(`/api/admin/collectors/${healthKey}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ interval_minutes: val }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    document.getElementById('collectorsError').style.display = 'block';
    document.getElementById('collectorsError').textContent = err.detail || `Error ${res.status}`;
  } else {
    document.getElementById('collectorsError').style.display = 'none';
  }
};

// ---------------------------------------------------------------------------
// Organisations
// ---------------------------------------------------------------------------
async function loadOrgs() {
  const res = await fetchAuth('/api/admin/orgs');
  if (!res.ok) {
    document.getElementById('orgsError').style.display = 'block';
    document.getElementById('orgsError').textContent = `Error ${res.status}`;
    return;
  }
  const data = await res.json();
  _orgList = data.orgs || [];
  renderOrgs(data.orgs, data.total);
}

function renderOrgs(orgs, total) {
  document.getElementById('orgsCount').textContent =
    window.t('admin.orgs.total', { n: total });

  if (!orgs.length) {
    document.getElementById('orgsBody').innerHTML =
      `<tr><td colspan="5" class="empty-msg">${window.t('admin.orgs.no_orgs')}</td></tr>`;
    return;
  }

  document.getElementById('orgsBody').innerHTML = orgs.map(o => `
    <tr>
      <td><code>${escHtml(o.slug)}</code></td>
      <td><strong>${escHtml(o.name)}</strong></td>
      <td style="color:#a0aec0">${escHtml(o.description || '—')}</td>
      <td>${fmtDate(o.created_at)}</td>
      <td><a href="/org/${escHtml(o.slug)}" target="_blank" style="color:#90cdf4; font-size:0.82rem;">↗ Dashboard</a></td>
    </tr>`).join('');
}

window.createOrg = async function() {
  const slug = document.getElementById('orgSlugInput').value.trim().toLowerCase();
  const name = document.getElementById('orgNameInput').value.trim();
  const description = document.getElementById('orgDescInput').value.trim() || null;
  const errEl = document.getElementById('orgsError');
  errEl.style.display = 'none';

  if (!slug || !name) {
    errEl.textContent = 'Slug and name are required.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('orgCreateBtn');
  btn.disabled = true;
  btn.textContent = window.t('admin.orgs.creating');

  const res = await fetchAuth('/api/admin/orgs', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slug, name, description }),
  });

  btn.disabled = false;
  btn.textContent = window.t('admin.orgs.create_btn');

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    errEl.textContent = err.detail || `Error ${res.status}`;
    errEl.style.display = 'block';
    return;
  }

  document.getElementById('orgSlugInput').value = '';
  document.getElementById('orgNameInput').value = '';
  document.getElementById('orgDescInput').value = '';
  _orgsLoaded = false;
  loadOrgs();
};

function escHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// Presets
// ---------------------------------------------------------------------------
async function loadPresets() {
  const res = await fetchAuth('/api/rulesets/presets');
  if (!res.ok) {
    document.getElementById('presetsError').textContent = `Error ${res.status}`;
    document.getElementById('presetsError').style.display = 'block';
    document.getElementById('presetsBody').innerHTML =
      `<tr><td colspan="5" class="empty-msg">${window.t('admin.presets.no_presets')}</td></tr>`;
    return;
  }
  const presets = await res.json();
  renderPresets(presets);
}

function renderPresets(presets) {
  document.getElementById('presetsCount').textContent =
    window.t('admin.presets.total', { n: presets.length });

  if (!presets.length) {
    document.getElementById('presetsBody').innerHTML =
      `<tr><td colspan="5" class="empty-msg">${window.t('admin.presets.no_presets')}</td></tr>`;
    return;
  }

  document.getElementById('presetsBody').innerHTML = presets.map(p => `
    <tr>
      <td><a href="/rulesets/${escHtml(p.id)}" style="color:#90cdf4;text-decoration:none"
           title="${window.t('admin.presets.view_tip')}">${escHtml(p.name)}</a></td>
      <td style="color:#a0aec0">${escHtml(p.description || '—')}</td>
      <td>${p.conditions?.length ?? 0}</td>
      <td>${p.webcams?.length ?? 0}</td>
      <td>
        <button class="trigger-btn" onclick="removePreset('${escHtml(p.id)}', this)"
          title="${window.t('admin.presets.remove_tip')}">
          ${window.t('admin.presets.remove')}
        </button>
      </td>
    </tr>`).join('');
}

window.removePreset = async function(id, btn) {
  btn.disabled = true;
  btn.textContent = '…';
  const res = await fetchAuth(`/api/rulesets/${id}/set_preset?is_preset=false`, { method: 'PUT' });
  if (!res.ok) {
    btn.disabled = false;
    btn.textContent = window.t('admin.presets.remove');
    const err = await res.json().catch(() => ({}));
    document.getElementById('presetsError').textContent = err.detail || `Error ${res.status}`;
    document.getElementById('presetsError').style.display = 'block';
  } else {
    document.getElementById('presetsError').style.display = 'none';
    _presetsLoaded = false;
    loadPresets();
  }
};

// ---------------------------------------------------------------------------
// Station dedup overrides
// ---------------------------------------------------------------------------
let _allStations = [];

async function loadStationsForDedup() {
  const res = await fetchAuth('/api/stations');
  if (!res.ok) return;
  _allStations = (await res.json()).sort((a, b) => a.name.localeCompare(b.name));
  const placeholder = window.t('admin.station_dedup.select_station');
  ['dedupStationA', 'dedupStationB'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = `<option value="">${placeholder}</option>` +
      _allStations.map(s =>
        `<option value="${escHtml(s.station_id)}">[${escHtml(s.network)}] ${escHtml(s.name)}</option>`
      ).join('');
  });
}

async function loadDedupOverrides() {
  const errEl = document.getElementById('dedupError');
  errEl.style.display = 'none';
  const res = await fetchAuth('/api/admin/station-dedup');
  if (!res.ok) {
    errEl.textContent = `Error ${res.status}`;
    errEl.style.display = 'block';
    return;
  }
  const { overrides } = await res.json();
  renderDedupOverrides(overrides);
}

function _stationLabel(sid) {
  const s = _allStations.find(x => x.station_id === sid);
  return s ? `[${s.network}] ${s.name}` : sid;
}

function renderDedupOverrides(overrides) {
  const tbody = document.getElementById('dedupBody');
  if (!overrides.length) {
    tbody.innerHTML = `<tr><td colspan="4" class="empty-msg">${window.t('admin.station_dedup.no_pairs')}</td></tr>`;
    return;
  }
  tbody.innerHTML = overrides.map(o => `
    <tr>
      <td>${escHtml(_stationLabel(o.station_id_a))}</td>
      <td>${escHtml(_stationLabel(o.station_id_b))}</td>
      <td>${escHtml(o.note || '—')}</td>
      <td><button class="btn-danger-sm" onclick="deleteDedupOverride('${escHtml(o.id)}')">${window.t('common.delete')}</button></td>
    </tr>`).join('');
}

window.addDedupPair = async function() {
  const sidA = document.getElementById('dedupStationA').value;
  const sidB = document.getElementById('dedupStationB').value;
  const note = document.getElementById('dedupNote').value.trim();
  const errEl = document.getElementById('dedupError');
  errEl.style.display = 'none';

  if (!sidA || !sidB) { errEl.textContent = window.t('admin.station_dedup.err_select_both'); errEl.style.display = 'block'; return; }
  if (sidA === sidB) { errEl.textContent = window.t('admin.station_dedup.err_same'); errEl.style.display = 'block'; return; }

  const res = await fetchAuth('/api/admin/station-dedup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ station_id_a: sidA, station_id_b: sidB, note: note || null }),
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    errEl.textContent = body.detail || `Error ${res.status}`;
    errEl.style.display = 'block';
    return;
  }
  document.getElementById('dedupStationA').value = '';
  document.getElementById('dedupStationB').value = '';
  document.getElementById('dedupNote').value = '';
  const saved = document.getElementById('dedupSavedMsg');
  saved.style.display = 'inline';
  setTimeout(() => { saved.style.display = 'none'; }, 3000);
  loadDedupOverrides();
};

window.deleteDedupOverride = async function(id) {
  if (!confirm(window.t('admin.station_dedup.confirm_delete'))) return;
  const res = await fetchAuth(`/api/admin/station-dedup/${id}`, { method: 'DELETE' });
  if (!res.ok && res.status !== 204) {
    document.getElementById('dedupError').textContent = `Error ${res.status}`;
    document.getElementById('dedupError').style.display = 'block';
    return;
  }
  loadDedupOverrides();
};

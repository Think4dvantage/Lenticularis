<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lenticularis — Signing in…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <span>Signing in…</span>

  <script type="module">
    import { storeAuth } from '/static/auth.js';

    console.log('[Lenti:oauth] processing OAuth callback');

    const params = new URLSearchParams(location.search);
    const code  = params.get('code');
    const error = params.get('error');

    if (error) {
      console.error('[Lenti:oauth] error from server:', error);
      window.location.href = '/login?error=' + encodeURIComponent(error);
    } else if (!code) {
      console.error('[Lenti:oauth] missing code param');
      window.location.href = '/login?error=oauth_missing_params';
    } else {
      // Strip the code from the URL immediately so it never sits in history
      history.replaceState(null, '', location.pathname);

      try {
        console.log('[Lenti:oauth] exchanging one-time code for tokens');
        const res = await fetch('/api/auth/oauth-exchange', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        if (!res.ok) {
          const detail = await res.text().catch(() => res.status);
          console.error('[Lenti:oauth] exchange failed:', detail);
          window.location.href = '/login?error=oauth_exchange_failed';
          return;
        }
        const data = await res.json();
        storeAuth(data.access_token, data.refresh_token, data.user);
        console.log('[Lenti:oauth] tokens stored, redirecting to /');
        window.location.href = '/';
      } catch (e) {
        console.error('[Lenti:oauth] exchange error:', e);
        window.location.href = '/login?error=oauth_exchange_error';
      }
    }
  </script>
</body>
</html>
